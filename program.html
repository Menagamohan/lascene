<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/booking.css">

    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: Arial;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        .left {
            width: 40%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .left img {
            width: 70%;
            border-radius: 10px;
        }
        
        .right {
            width: 60%;
            padding: 50px;
        }
        
        .title {
            font-size: 40px;
            margin-bottom: 20px;
        }
        
        .details p {
            margin: 5px 0;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: white;
            color: black;
            cursor: pointer;
        }
        /* arrows */
        
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 30px;
            cursor: pointer;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
        }
        
        .left-arrow {
            left: 10px;
        }
        
        .right-arrow {
            right: 10px;
        }

        /* RESPONSIVE */

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }
            .left, .right {
                width: 100%;
            }
            .left {
                padding-top: 40px;
            }
            .left img {
                width: 50%;
            }
            .right {
                padding: 30px;
                text-align: center;
            }
            .details {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 15px;
            }
        }

        @media (max-width: 768px) {
            .left img {
                width: 80%;
            }
            .title {
                font-size: 28px;
            }
            .details {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

    <div class="arrow left-arrow" onclick="prevSlide()">❮</div>

    <div class="container">
        <div class="left">
            <img id="programImage">
        </div>

        <div class="right">
            <div class="title" id="programTitle"></div>

            <div class="details">
                <p>Dates: <span id="Dates"></span></p>
                <p>Horaires: <span id="Horaires"></span></p>
                <p>Salle: <span id="Salle"></span></p>
                <p>Tarif: <span id="Tarif"></span></p>

            <p id="desc"></p><br><br>

            <button class="btn" onclick="openBooking()">TO BOOK</button>
        </div>
    </div>

    <!-- BOOKING OVERLAY -->
    <div class="booking-overlay" id="bookingOverlay">
        <div class="booking-header">
            <button class="booking-back" onclick="bookingBack()">← Retour</button>
            <button class="booking-close" onclick="closeBooking()">✕</button>
        </div>

        <!-- Step 1: Show Details -->
        <div class="booking-content" id="bookingStep1">
            <div class="booking-poster">
                <img id="bookingImage" src="" alt="Show poster">
            </div>
            <div class="booking-details">
                <h1 id="bookingTitle"></h1>
                <div class="booking-info">
                    <div class="booking-info-row"><span class="label">Dates</span><span class="value" id="bookingDates"></span></div>
                    <div class="booking-info-row"><span class="label">Horaires</span><span class="value" id="bookingHoraires"></span></div>
                    <div class="booking-info-row"><span class="label">Salle</span><span class="value" id="bookingSalle"></span></div>
                    <div class="booking-info-row"><span class="label">Tarif</span><span class="value" id="bookingTarif"></span></div>
                    <div class="booking-info-row"><span class="label">Durée</span><span class="value" id="bookingDuree"></span></div>
                </div>
                <div class="booking-desc" id="bookingDesc"></div>
                <button class="btn-reserver" onclick="showCalendarStep()">RÉSERVER</button>
            </div>
        </div>

        <!-- Step 2: Calendar & Time Selection -->
        <div class="booking-calendar-step" id="bookingStep2">
            <h2 class="booking-step-title">Choisissez une date</h2>
            <p class="booking-step-show" id="calendarShowTitle"></p>
            <div class="calendar-nav">
                <button onclick="calendarPrev()">❮ Précédent</button>
                <span class="month-label" id="calendarMonthLabel"></span>
                <button onclick="calendarNext()">Suivant ❯</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <div class="time-slots-section" id="timeSlotsSection">
                <h3 class="time-slots-title" id="timeSlotsTitle">Horaires disponibles</h3>
                <div class="time-slots-grid" id="timeSlotsGrid"></div>
            </div>
            <button class="btn-confirm" id="btnConfirm" onclick="confirmBooking()">CONFIRMER LA RÉSERVATION</button>
        </div>

        <!-- Step 3: Confirmation -->
        <div class="booking-confirmed" id="bookingStep3">
            <div class="check-icon">✓</div>
            <h2>Réservation Confirmée !</h2>
            <p id="confirmShowTitle"></p>
            <p id="confirmDateTime"></p>
            <p id="confirmSalle"></p>
            <p id="confirmTarif"></p>
            <button class="btn-done" onclick="closeBooking()">RETOUR AUX SPECTACLES</button>
        </div>
    </div>
